<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Cronin Baseball Pro</title>
<style>
:root{--gold:#f1c40f;--blue:#3498db;--bg:#050505;--grass:#1b3318;--board:#111;--wood:#8b5a2b;}
body{margin:0;background:#000;color:#fff;font-family:'Inter',sans-serif;overflow:hidden;height:100svh;display:flex;flex-direction:column;}

#banner{height:3.5vh;background:#000;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;color:var(--gold);border-bottom:1px solid #222;}

/* Three.js canvas lives here — full width, 63vh tall */
#v-frame{width:100%;height:63vh;overflow:hidden;position:relative;background:#000;}
#v-frame canvas{position:absolute;top:0;left:0;width:100%!important;height:100%!important;}

#deck{height:33.5vh;display:grid;grid-template-columns:0.95fr 1.05fr;background:#050505;padding:4px 8px;gap:8px;padding-bottom:env(safe-area-inset-bottom);}
.panel{display:flex;flex-direction:column;align-items:center;justify-content:space-between;height:100%;position:relative;}

#scoreboard-strip{width:100%;height:5vh;background:var(--board);border:1px solid #333;border-radius:4px;display:flex;align-items:center;justify-content:space-around;padding:0 5px;}
.stat-unit{display:flex;flex-direction:column;align-items:center;}
.stat-label{font-size:7px;color:#666;font-weight:800;}
.dots{display:flex;gap:2px;margin-top:2px;}
.dot{width:6px;height:6px;border-radius:50%;background:#222;border:1px solid #333;}
.b-on{background:var(--blue);box-shadow:0 0 5px var(--blue);}
.s-on{background:var(--gold);box-shadow:0 0 5px var(--gold);}
.o-on{background:#e74c3c;box-shadow:0 0 5px #e74c3c;}

#mini-diamond{width:22px;height:22px;position:relative;transform:rotate(45deg);}
.m-base{position:absolute;width:5px;height:5px;border:1px solid #333;background:#111;}
#mb-1{top:0;right:0;}#mb-2{top:0;left:0;}#mb-3{bottom:0;left:0;}
.m-on{background:var(--gold);border-color:#fff;}

#field-container{width:100%;flex-grow:1;background:#000;position:relative;overflow:hidden;margin-top:4px;border-radius:4px;border:1px solid #222;}
.field-svg{width:100%;height:100%;}
.hit-dot{position:absolute;width:16px;height:16px;background:rgba(0,0,0,0.9);border:1px solid #fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:7px;font-weight:900;transform:translate(-50%,-50%);}

#result-card{width:100%;height:6.5vh;background:var(--board);border:1.5px solid #444;border-radius:4px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:4px;text-align:center;}
#res-main{color:var(--gold);font-size:13px;font-weight:900;text-transform:uppercase;letter-spacing:1px;}
#res-sub{color:#aaa;font-size:8.5px;font-family:'Courier New',Courier,monospace;margin-top:2px;font-weight:600;}

#swing-zone{width:100%;flex-grow:1;display:flex;align-items:center;justify-content:center;position:relative;touch-action:none;background:rgba(255,255,255,0.02);border-radius:4px;margin-top:4px;}
#strike-zone{width:80px;height:120px;border:2px solid #fff;background:rgba(255,255,255,0.03);position:relative;pointer-events:none;border-radius:2px;}
.ball-asset{position:absolute;width:22px;height:22px;background:#fff;border-radius:50%;transform:translate(-50%,-50%);z-index:5;box-shadow:0 0 10px #fff;}
.bat-asset{position:absolute;width:30px;height:30px;background:var(--wood);border-radius:50%;transform:translate(-50%,-50%);z-index:4;border:2px solid #000;}
.pitch-dot{position:absolute;width:22px;height:22px;background:rgba(255,255,255,0.3);border:1.5px solid #fff;border-radius:50%;transform:translate(-50%,-50%);z-index:1;}
</style>
</head>
<body>

<div id="banner">Cronin Baseball</div>

<!-- Three.js animation replaces video here -->
<div id="v-frame"></div>

<div id="deck">
  <div class="panel">
    <div id="scoreboard-strip">
      <div class="stat-unit"><span class="stat-label">B</span><div class="dots" id="b-dots"></div></div>
      <div class="stat-unit"><span class="stat-label">S</span><div class="dots" id="s-dots"></div></div>
      <div class="stat-unit"><span class="stat-label">O</span><div class="dots" id="o-dots"></div></div>
      <div id="mini-diamond">
        <div id="mb-2" class="m-base"></div><div id="mb-1" class="m-base"></div><div id="mb-3" class="m-base"></div>
      </div>
      <div class="stat-unit"><span class="stat-label">R</span><span style="font-size:11px;font-weight:900;" id="r-val">0</span></div>
    </div>
    <div id="field-container">
      <svg class="field-svg" id="field-svg" viewBox="0 0 100 100">
        <path d="M50 98 L5 48 A 65 65 0 0 1 95 48 L50 98" fill="var(--grass)"/>
        <line x1="50" y1="98" x2="5" y2="48" stroke="rgba(255,255,255,0.4)" stroke-width="1"/>
        <line x1="50" y1="98" x2="95" y2="48" stroke="rgba(255,255,255,0.4)" stroke-width="1"/>
      </svg>
    </div>
  </div>

  <div class="panel">
    <div id="result-card">
      <div id="res-main">READY</div>
      <div id="res-sub">WAITING FOR PITCH</div>
    </div>
    <div id="swing-zone">
      <div id="strike-zone"></div>
    </div>
  </div>
</div>

function posAtT(p,t){
  return {x:p.x0+p.vx0*t+0.5*p.ax*t*t,
          y:p.y0+p.vy0*t+0.5*p.ay*t*t,
          z:p.z0+p.vz0*t+0.5*p.az*t*t};
}
function sc2v(x,y,z){return new THREE.Vector3(-x,z,-y);}
function isStrike(p){return Math.abs(p.px)<=0.4318/2&&p.pz>=p.sz_bot&&p.pz<=p.sz_top;}

function broadcast(p,phase){
  const payload={
    phase,
    ab:p.ab,pn:p.pn,inn:p.inn,topbot:p.topbot,
    name:p.name,batter:p.batter,stand:p.s,p_throws:p.p,
    tof_sec:p.tof,
    tof_ms:Math.round(p.tof*1000),
    // plate coords in meters & inches
    px_m:p.px, pz_m:p.pz,
    px_in:+(p.px/0.0254).toFixed(1),
    pz_in:+(p.pz/0.0254).toFixed(1),
    sz_top_m:p.sz_top, sz_bot_m:p.sz_bot,
    is_strike:isStrike(p),
    speed_mph:p.speed,
    vx0:p.vx0,vy0:p.vy0,vz0:p.vz0,
    ax:p.ax,ay:p.ay,az:p.az,
    x0:p.x0,y0:p.y0,z0:p.z0,
    desc:p.desc,events:p.events,color:p.color,
  };
  // Same-page: fire as a window event so the bottom UI can listen
  window.dispatchEvent(new CustomEvent('pitch',{detail:payload}));
}

const FLIGHT_SAMPLES=64;
let flightPath=[];
function sampleFlightPath(p){
  flightPath=[];
  for(let i=0;i<=FLIGHT_SAMPLES;i++){
    const t=(i/FLIGHT_SAMPLES)*p.tof;
    const sc=posAtT(p,t);
    flightPath.push(sc2v(sc.x,sc.y,sc.z));
  }
}

let zoneGroup=null;
function buildZone(p){
  if(zoneGroup)scene.remove(zoneGroup);
  zoneGroup=new THREE.Group();
  const W=0.4318,H=p.sz_top-p.sz_bot,midY=p.sz_bot+H/2;
  const mat=new THREE.MeshBasicMaterial({color:0xffffff,side:THREE.DoubleSide});
  const t=0.008;
  [[0,p.sz_top,W,t],[0,p.sz_bot,W,t],[-W/2,midY,t,H],[W/2,midY,t,H]].forEach(([x,y,w,h])=>{
    const m=new THREE.Mesh(new THREE.PlaneGeometry(w,h),mat.clone());
    m.position.set(x,y,0.05);zoneGroup.add(m);
  });
  scene.add(zoneGroup);
}
function colorZone(strike){
  if(!zoneGroup)return;
  const c=new THREE.Color(strike?0xff2200:0x0066ff);
  zoneGroup.children.forEach(m=>{if(m.material)m.material.color.copy(c);});
}

const EYE_HIGH=1.676,EYE_LOW=1.524,EYE_Z=0.46;
function batPos(s,ey){return new THREE.Vector3(s==='R'?-0.978:0.978,ey,EYE_Z);}
function catPos(s){return new THREE.Vector3(s==='R'?-0.30:0.30,0.61,1.52);}

function setZoneLook(p){ZONE_LOOK.set(0,(p.sz_bot+p.sz_top)/2,0.05);}

function loadPitch(){
  curPitch=PITCHES[pitchIdx%PITCHES.length];pitchIdx++;
  const p=curPitch;
  const hex=parseInt(p.color.replace('#',''),16);
  ballMat.color.setHex(hex);
  ballMat.emissive.setHex(hex);
  buildZone(p);setZoneLook(p);
  relPos.copy(sc2v(p.x0,p.y0,p.z0));
  endPt.copy(sc2v(p.px,0.4318,p.pz));
  ball.visible=true;ball.position.copy(relPos);
  plateFlashed=false;
  broadcast(p,'preview');
  rigPTgt.copy(batPos(p.s,EYE_HIGH));
  if(pitchIdx===1){rigP.copy(rigPTgt);lookA.copy(relPos);lookTgt.copy(relPos);}
  phase='pre_pause';phaseT=0;
}

function startFlight(){
  sampleFlightPath(curPitch);
  ball.position.copy(sc2v(posAtT(curPitch,0).x,posAtT(curPitch,0).y,posAtT(curPitch,0).z));
  flightStart=performance.now();
  phase='fly';phaseT=0;
}

let lastT=performance.now();
function animate(){
  requestAnimationFrame(animate);
  const now=performance.now();
  const dt=Math.min((now-lastT)/1000,0.05);
  lastT=now;phaseT+=dt;
  if(!curPitch){renderer.render(scene,camera);return;}

  const p=curPitch;
  const bP=batPos(p.s,EYE_HIGH);
  const cP=catPos(p.s);

  if(phase==='pre_pause'){
    rigPTgt.copy(bP);lookTgt.copy(relPos);
    fovTgt=50-(50-28)*Math.min(phaseT/1.0,1.0);
    ball.position.copy(relPos);ball.visible=true;
    if(phaseT>=1.0){phase='pre_blink';phaseT=0;}
  }
  else if(phase==='pre_blink'){
    rigPTgt.copy(bP);lookTgt.copy(relPos);fovTgt=28;
    ball.position.copy(relPos);
    ball.visible=(phaseT%0.30)/0.30<0.65;
    if(phaseT>=0.9){ball.visible=true;startFlight();}
  }
  else if(phase==='fly'){
    const elapsed=(now-flightStart)/1000;
    const prog=Math.min(elapsed/p.tof,1.0);
    const t=Math.min(elapsed,p.tof);
    const sc=posAtT(p,t);
    const pos=sc2v(sc.x,sc.y,sc.z);
    ball.position.copy(pos);
    ball.rotation.x+=dt*22;ball.rotation.z+=dt*9;
    ballLight.position.copy(pos);ballFill.position.copy(pos);
    rigPTgt.lerpVectors(bP,cP,prog);
    rigPTgt.y=EYE_HIGH+(EYE_LOW-EYE_HIGH)*Math.pow(prog,0.8);
    lookTgt.lerpVectors(relPos,ZONE_LOOK,Math.min(prog/0.4,1.0));
    fovTgt=28+(44-28)*prog;
    rigRoll=(15*Math.PI/180)*Math.sin(prog*Math.PI)*((prog<0.5)?1:-1);

    if(!plateFlashed&&elapsed>=p.tof){
      plateFlashed=true;
      broadcast(p,'crossing');
    }
    if(elapsed>=p.tof+0.06){
      ball.position.copy(endPt);
      colorZone(isStrike(p));
      broadcast(p,'result');
      phase='post_land';phaseT=0;
    }
  }
  else if(phase==='post_land'){
    ball.position.copy(endPt);ball.visible=true;
    rigPTgt.copy(cP);lookTgt.copy(endPt);fovTgt=44;
    rigRoll*=(1-Math.min(dt*5,1));
    if(phaseT>=1.0){phase='post_climb';phaseT=0;}
  }
  else if(phase==='post_climb'){
    const t2=Math.min(phaseT/1.0,1.0);
    const idx=Math.max(0,Math.round((1.0-t2)*(flightPath.length-1)));
    const bp=flightPath[idx];
    ball.position.copy(bp);ballLight.position.copy(bp);
    ball.visible=true;
    rigPTgt.lerpVectors(cP,bP,t2);
    lookTgt.copy(bp);
    fovTgt=44+(50-44)*t2;
    if(phaseT>=1.0){ball.visible=false;loadPitch();}
  }

  const jt=now*0.001;
  if(phase==='fly'){
    rigP.lerp(rigPTgt,Math.min(dt*12,1));
    lookA.lerp(lookTgt,Math.min(dt*6,1));
    fovA+=(fovTgt-fovA)*Math.min(dt*8,1);
    rigP.x+=Math.sin(jt*1.3)*0.003;
    rigP.y+=Math.sin(jt*0.9)*0.002;
  } else {
    rigRoll*=(1-Math.min(dt*3,1));
    rigP.lerp(rigPTgt,Math.min(dt*K,1));
    lookA.lerp(lookTgt,Math.min(dt*K,1));
    fovA+=(fovTgt-fovA)*Math.min(dt*K,1);
  }
  if(gyroOn&&baseAlpha!==null&&phase==='fly'){
    let dA=rawAlpha-baseAlpha;if(dA>180)dA-=360;if(dA<-180)dA+=360;
    rig.rotation.y=-dA*(Math.PI/180)*0.06;
    rig.rotation.x=(rawBeta-baseBeta)*(Math.PI/180)*0.05;
  } else {
    rig.rotation.y*=(1-Math.min(dt*4,1));
    rig.rotation.x*=(1-Math.min(dt*4,1));
  }
  rig.position.copy(rigP);
  rig.rotation.z=rigRoll;
  camera.fov=fovA;camera.updateProjectionMatrix();
  camera.lookAt(lookA);
  renderer.render(scene,camera);
}
loadPitch();
animate();
</script>

<!-- ═══════════════════════════════════════════════════════════════
  BOTTOM UI GAME LOGIC
  Listens for 'pitch' CustomEvents from the Three.js animation above.
  Uses real Statcast px/pz for location, tof_sec for timing window.
═══════════════════════════════════════════════════════════════ -->
<script>
const sz  = document.getElementById('strike-zone');
const swz = document.getElementById('swing-zone');
const fSvg= document.getElementById('field-svg');
const resMain = document.getElementById('res-main');
const resSub  = document.getElementById('res-sub');

let g = {r:0,b:0,s:0,o:0,bases:[false,false,false]};
let activePitch = null;   // set on 'preview', used on tap/result
let swingTime   = null;   // performance.now() when flight started
let pitched     = false;  // prevent double-processing

// ── Receive pitch events from Three.js ───────────────────────────────────
window.addEventListener('pitch', e => {
  const d = e.detail;

  if(d.phase === 'preview'){
    // New pitch loading — reset state, show dot at predicted location
    pitched = false;
    activePitch = d;
    swingTime = null;
    sz.querySelectorAll('.ball-asset,.bat-asset,.pitch-dot').forEach(el=>el.remove());
    resMain.innerText = 'PITCH COMING';
    resSub.innerText  = d.name + ' · ' + Math.round(d.speed_mph) + ' MPH';
    // Show predicted location dot (faint)
    showDot(d, 'pitch-dot');
    // Record flight start time for timing calc
    swingTime = performance.now() + 1900; // ~1.9s of pause+blink before ball leaves hand
  }

  if(d.phase === 'crossing'){
    // Ball just crossed plate — if no swing yet, auto-process as taken
    if(!pitched){
      pitched = true;
      processTaken(d);
    }
  }

  if(d.phase === 'result'){
    updateUI();
  }
});

// ── Swing input ───────────────────────────────────────────────────────────
swz.addEventListener('touchstart', e => {
  e.preventDefault();
  if(!activePitch || pitched) return;
  pitched = true;

  const now    = performance.now();
  const tof_ms = activePitch.tof_ms;
  // timing delta vs plate crossing
  const expectedAt = swingTime + tof_ms;
  const tDiff_ms   = now - expectedAt;  // negative=early, positive=late

  const rect   = sz.getBoundingClientRect();
  const touchX = e.touches[0].clientX - rect.left;
  const touchY = e.touches[0].clientY - rect.top;

  // Map real plate coords to pixel position inside #strike-zone
  const {pxPx, pyPx} = plateToPixel(activePitch);

  const dist   = Math.sqrt((touchX-pxPx)**2 + (touchY-pyPx)**2);

  // Show bat & ball
  const bat = document.createElement('div'); bat.className='bat-asset';
  bat.style.left=touchX+'px'; bat.style.top=touchY+'px'; sz.appendChild(bat);
  const ballEl = document.createElement('div'); ballEl.className='ball-asset';
  ballEl.style.left=pxPx+'px'; ballEl.style.top=pyPx+'px'; sz.appendChild(ballEl);

  if(dist < 34){
    // Contact!
    const la  = Math.round(((touchY - pyPx) / 15) * 45);
    const ang = Math.round((pxPx - touchX) * 2.5);
    const ev  = Math.round(110 - (dist*2.5) - (Math.abs(tDiff_ms)*0.35));
    const ft  = Math.round((ev*4.3)*(Math.cos(la*Math.PI/180)));
    const timeTag = tDiff_ms < -100 ? 'EARLY' : tDiff_ms > 100 ? 'LATE' : 'PERFECT';
    const contactTag = dist<10 ? 'SQUARED' : dist<22 ? 'SOLID' : 'WEAK';
    resSub.innerText = '['+timeTag+'] '+tDiff_ms.toFixed(0)+'ms | '+contactTag+' | EV:'+ev;
    handleHit(ft, ang, la);
  } else {
    // Swing and miss
    resMain.innerText = 'STRIKE (WHIFF)';
    resSub.innerText  = 'MISS '+Math.round(dist)+'px | '+tDiff_ms.toFixed(0)+'ms';
    addStrike('SWINGING');
    updateUI();
  }
}, {passive:false});

// ── Helpers ───────────────────────────────────────────────────────────────

// Convert real Statcast plate_x / plate_z to pixel position in #strike-zone
function plateToPixel(d){
  const szW = sz.offsetWidth, szH = sz.offsetHeight;
  // px_m: -0.2159 to +0.2159 (half plate width = 0.2159m)
  const xNorm = (d.px_m / 0.2159) * 0.5 + 0.5;   // 0=left edge, 1=right edge
  // pz_m: sz_bot_m to sz_top_m
  const zNorm = 1 - ((d.pz_m - d.sz_bot_m)/(d.sz_top_m - d.sz_bot_m));
  return {
    pxPx: Math.max(0,Math.min(szW, xNorm * szW)),
    pyPx: Math.max(0,Math.min(szH, zNorm * szH))
  };
}

function showDot(d, cls){
  const {pxPx,pyPx} = plateToPixel(d);
  const dot = document.createElement('div'); dot.className=cls;
  dot.style.left=pxPx+'px'; dot.style.top=pyPx+'px';
  sz.appendChild(dot);
}

function processTaken(d){
  // Ball crossed plate, batter took it
  showDot(d, 'ball-asset');
  if(d.is_strike){
    resMain.innerText = 'CALLED STRIKE';
    resSub.innerText  = d.name+' | '+Math.round(d.speed_mph)+' MPH | '+d.pz_in+'in high';
    addStrike('CALLED');
  } else {
    resMain.innerText = 'BALL';
    resSub.innerText  = d.name+' | '+Math.round(d.speed_mph)+' MPH | '+d.px_in+'in wide';
    addBall();
  }
  updateUI();
}

function handleHit(ft, angle, la){
  let res='OUT', move=0, tag='OUT';
  if(Math.abs(angle)>52){
    if(ft>10&&ft<30){ g.o++;g.b=0;g.s=0;resMain.innerText='FOUL OUT';checkState(); }
    else{ addStrike('FOUL');resMain.innerText='FOUL'; }
    updateUI();return;
  }
  if(ft<110){res=la<0?'GROUND OUT':'POP OUT';}
  else if(ft<225){res='SINGLE';move=1;tag='1B';}
  else if(ft<325){res='DOUBLE';move=2;tag='2B';}
  else{
    const wall=Math.abs(angle)>35?335:400;
    if(ft>=wall){res='HOME RUN';move=4;tag='HR';}
    else{res='TRIPLE';move=3;tag='3B';}
  }
  resMain.innerText=res+' ('+ft+' FT)';
  const ds=(ft/400)*50;
  const endY=98-ds, endX=50+(angle*(ds/50));
  const line=document.createElementNS('http://www.w3.org/2000/svg','line');
  line.setAttribute('x1','50');line.setAttribute('y1','98');
  line.setAttribute('x2',endX);line.setAttribute('y2',endY);
  line.setAttribute('stroke',move>0?'var(--gold)':`#555`);
  line.setAttribute('stroke-width','1.5');
  fSvg.appendChild(line);
  const dot=document.createElement('div');dot.className='hit-dot';dot.innerText=tag;
  dot.style.left=endX+'%';dot.style.top=endY+'%';
  document.getElementById('field-container').appendChild(dot);
  if(move>0){g.b=0;g.s=0;advanceRunners(move);}
  else{g.o++;g.b=0;g.s=0;checkState();}
  updateUI();
}

function advanceRunners(bases){
  for(let i=0;i<bases;i++){
    if(g.bases[2])g.r++;
    g.bases[2]=g.bases[1];g.bases[1]=g.bases[0];
    g.bases[0]=(i===0&&bases<4);
    if(bases===4&&i===3)g.r++;
  }
}
function addStrike(reason){
  if(reason==='FOUL'){if(g.s<2)g.s++;}
  else{
    g.s++;
    if(g.s>=3){g.s=0;g.b=0;g.o++;resMain.innerText='STRIKE THREE (OUT)';checkState();}
    else{resMain.innerText='STRIKE';}
  }
}
function addBall(){
  g.b++;
  if(g.b>=4){
    g.b=0;g.s=0;resMain.innerText='WALK';
    if(g.bases[0]&&g.bases[1]&&g.bases[2])g.r++;
    else if(g.bases[0]&&g.bases[1])g.bases[2]=true;
    else if(g.bases[0])g.bases[1]=true;
    g.bases[0]=true;
  }
}
function checkState(){if(g.o>=3){g.o=0;g.bases=[false,false,false];resMain.innerText='INNING OVER (3 OUTS)';}}
function updateUI(){
  document.getElementById('r-val').innerText=g.r;
  const render=(id,cur,max,cls)=>{
    let h='';for(let i=0;i<max;i++)h+='<div class="dot '+(i<cur?cls:'')+'"></div>';
    document.getElementById(id).innerHTML=h;
  };
  render('b-dots',g.b,3,'b-on');render('s-dots',g.s,2,'s-on');render('o-dots',g.o,2,'o-on');
  document.getElementById('mb-1').className='m-base '+(g.bases[0]?'m-on':'');
  document.getElementById('mb-2').className='m-base '+(g.bases[1]?'m-on':'');
  document.getElementById('mb-3').className='m-base '+(g.bases[2]?'m-on':'');
}
updateUI();
</script>
</body>
</html>
