<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cronin Baseball: WIN Engine</title>
    <style>
        :root { --gold: #f1c40f; --bg: #050505; }
        body { margin: 0; background: var(--bg); color: #fff; font-family: sans-serif; overflow: hidden; height: 100vh; }
        
        /* The Field View */
        #field { height: 60vh; width: 100%; position: relative; background: #000; overflow: hidden; perspective: 1000px; border-bottom: 2px solid #222; }
        
        /* The Pitcher (Placeholder for your video) */
        #pitcher { position: absolute; bottom: 40%; left: 50%; transform: translateX(-50%); width: 60px; height: 120px; background: rgba(255,255,255,0.1); border-radius: 10px; }

        /* THE BALL ENGINE */
        #ball { 
            position: absolute; width: 10px; height: 10px; background: #fff; border-radius: 50%;
            box-shadow: 0 0 10px #fff; display: none; z-index: 100;
            transition: transform 0.4s linear, width 0.4s linear, height 0.4s linear, opacity 0.1s;
        }

        #ui { height: 40vh; padding: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .zone { width: 120px; height: 160px; border: 2px solid var(--gold); position: relative; }
        .btn { padding: 15px 40px; border: 2px solid var(--gold); color: var(--gold); background: transparent; border-radius: 50px; font-weight: 900; margin-top: 20px; }
    </style>
</head>
<body>

<div id="field">
    <div id="pitcher"></div>
    <div id="ball"></div>
</div>

<div id="ui">
    <div id="status" style="margin-bottom: 10px; font-weight: 900; color: var(--gold);">READY</div>
    <div class="zone" id="swing-area"></div>
    <button class="btn" onclick="throwPitch()">NEXT PITCH</button>
</div>

<script>
    const ball = document.getElementById('ball');
    const status = document.getElementById('status');
    
    // WIN Reality Data Points (Normalized)
    const pitches = [
        { type: "Fastball", speed: 400, endX: 50, endY: 60 }, // Middle-In
        { type: "Slider", speed: 650, endX: 30, endY: 80 },   // Low-Away
        { type: "Cutter", speed: 450, endX: 70, endY: 30 }    // High-In
    ];

    function throwPitch() {
        const p = pitches[Math.floor(Math.random() * pitches.length)];
        status.innerText = "RECOGNIZING...";
        
        // 1. Reset Ball to Pitcher's Hand
        ball.style.display = "block";
        ball.style.transition = "none";
        ball.style.width = "4px";
        ball.style.height = "4px";
        ball.style.left = "50%";
        ball.style.top = "55%";
        ball.style.opacity = "1";

        // 2. Trigger "The WIN Logic" (Flight Path)
        setTimeout(() => {
            ball.style.transition = `all ${p.speed}ms cubic-bezier(0.25, 0.1, 0.25, 1)`;
            ball.style.width = "40px"; // Gets bigger as it nears home
            ball.style.height = "40px";
            ball.style.left = p.endX + "%";
            ball.style.top = "100%"; // Hits the "plate"
            
            // 3. Detect Timing
            setTimeout(() => {
                ball.style.opacity = "0";
                status.innerText = p.type + " - " + (Math.random() > 0.5 ? "ON TIME" : "LATE");
            }, p.speed - 50);
        }, 100);
    }
</script>
</body>
</html>
