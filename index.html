<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Cronin Baseball: Legend Series</title>
    <style>
        :root { --gold: #f1c40f; --bg: #050505; --board: #111; }
        body { margin: 0; background: #000; color: #fff; font-family: 'Inter', sans-serif; overflow: hidden; height: 100svh; display: flex; flex-direction: column; }
        
        /* Selection Header */
        #player-select { height: 7vh; background: #111; display: flex; align-items: center; justify-content: space-around; border-bottom: 2px solid #333; }
        .p-btn { padding: 8px 15px; border-radius: 20px; border: 1px solid #444; background: #222; color: #fff; font-size: 12px; font-weight: 800; cursor: pointer; transition: 0.3s; }
        .p-btn:active { background: var(--gold); color: #000; transform: scale(0.95); }
        .active-p { border-color: var(--gold); color: var(--gold); }

        #v-frame { width: 100%; height: 60vh; position: relative; background: #000; }
        video { width: 100%; height: 100%; object-fit: contain; }

        #deck { height: 33vh; display: grid; grid-template-columns: 1fr 1fr; background: #050505; padding: 8px; gap: 8px; }
        .panel { display: flex; flex-direction: column; align-items: center; justify-content: space-between; }

        #result-card { width: 100%; height: 8vh; background: var(--board); border: 1.5px solid #444; border-radius: 4px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #res-main { color: var(--gold); font-size: 14px; font-weight: 900; }
        
        #swing-zone { width: 100%; flex-grow: 1; display: flex; align-items: center; justify-content: center; position: relative; touch-action: none; background: rgba(255,255,255,0.03); border-radius: 4px; margin-top: 5px; }
        #strike-zone { width: 90px; height: 130px; border: 2px solid #fff; position: relative; pointer-events: none; }
        
        .asset { position: absolute; width: 24px; height: 24px; border-radius: 50%; transform: translate(-50%, -50%); }
        .ball { background: #fff; box-shadow: 0 0 10px #fff; z-index: 5; }
        .bat { background: #8b5a2b; border: 2px solid #000; z-index: 4; }
    </style>
</head>
<body>

<div id="player-select">
    <div class="p-btn" onclick="loadLegend('ohtani', 660271)">OHTANI</div>
    <div class="p-btn" onclick="loadLegend('judge', 592450)">JUDGE</div>
    <div class="p-btn" onclick="loadLegend('trout', 545361)">TROUT</div>
</div>

<div id="v-frame">
    <video id="v" autoplay muted playsinline crossorigin="anonymous"></video>
</div>

<div id="deck">
    <div class="panel">
        <div id="result-card">
            <div id="res-main">SELECT PLAYER</div>
            <div id="res-sub" style="font-size: 9px; color: #888;">TAP A LEGEND TO START</div>
        </div>
        <div id="swing-zone"><div id="strike-zone"></div></div>
    </div>
    <div class="panel">
        <div style="font-size: 10px; color: #555;">STATS & LOGS</div>
        <div id="log-display" style="font-size: 9px; text-align: center; color: #aaa;"></div>
    </div>
</div>

<script>
    const v = document.getElementById('v');
    const resMain = document.getElementById('res-main');
    const resSub = document.getElementById('res-sub');
    const sz = document.getElementById('strike-zone');
    const swz = document.getElementById('swing-zone');

    let playlist = [];
    let pIdx = 0;
    let processed = false;

    async function loadLegend(name, id) {
        resMain.innerText = `FETCHING ${name}...`;
        pIdx = 0;
        
        // Fetch playLog for 2025 and 2026 to ensure 15 HRs
        const url = `https://statsapi.mlb.com/api/v1/people/${id}/stats?stats=playLog&group=hitting&season=2026`;
        const res = await fetch(url);
        const data = await res.json();
        
        playlist = data.stats[0].splits
            .filter(p => p.result.event === "Home Run")
            .slice(0, 15)
            .map(hr => ({
                src: `https://fastball-clips.mlb.com/${hr.game.gamePk}/${hr.playId}.mp4`,
                x: hr.pitchData.coordinates.pX,
                y: hr.pitchData.coordinates.pZ,
                t: 2.7, // Global timing for pre-cut clips
                desc: hr.result.description
            }));

        if(playlist.length > 0) playNext();
    }

    function playNext() {
        if(pIdx >= playlist.length) { resMain.innerText = "ALL 15 COMPLETE!"; return; }
        v.src = playlist[pIdx].src;
        v.load();
        processed = false;
        resMain.innerText = "READY...";
        resSub.innerText = `HR #${pIdx + 1} of 15`;
    }

    swz.addEventListener('touchstart', (e) => {
        if(processed || !playlist[pIdx]) return;
        const now = v.currentTime;
        const p = playlist[pIdx];
        
        // Timing window for the pitch crossing the plate
        if(Math.abs(now - p.t) > 0.8) return;
        
        processed = true;
        const rect = sz.getBoundingClientRect();
        const tx = e.touches[0].clientX - rect.left;
        const ty = e.touches[0].clientY - rect.top;
        
        // Map Statcast X/Y to UI
        const px = ((p.x / 1.5) + 0.5) * sz.offsetWidth;
        const py = (0.5 - (p.y / 2.0)) * sz.offsetHeight;

        const ball = document.createElement('div'); ball.className='asset ball'; ball.style.left=px+'px'; ball.style.top=py+'px'; sz.appendChild(ball);
        const bat = document.createElement('div'); bat.className='asset bat'; bat.style.left=tx+'px'; bat.style.top=ty+'px'; sz.appendChild(bat);

        const dist = Math.sqrt((tx - px)**2 + (ty - py)**2);
        if(dist < 35) {
            resMain.innerText = "BOOM! HOME RUN!";
        } else {
            resMain.innerText = "WHIFF!";
        }
        
        setTimeout(() => {
            sz.innerHTML = "";
            pIdx++;
            playNext();
        }, 2500);
    });

    v.onended = () => { if(!processed) { pIdx++; playNext(); } };
</script>
</body>
</html>
