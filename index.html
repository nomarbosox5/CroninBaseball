function posAtT(p,t){
return {x:p.x0+p.vx0*t+0.5*p.ax*t*t,
y:p.y0+p.vy0*t+0.5*p.ay*t*t,
z:p.z0+p.vz0*t+0.5*p.az*t*t};
}
function sc2v(x,y,z){return new THREE.Vector3(-x,z,-y);}

rawAlpha=e.alpha;rawBeta=e.beta;
},true);
(function(){
if(typeof DeviceOrientationEvent!==‘undefined’&&typeof DeviceOrientationEvent.requestPermission===‘function’)
window.addEventListener(‘touchend’,()=>DeviceOrientationEvent.requestPermission().then(r=>{if(r===‘granted’)gyroOn=true;}),{once:true});

// –– FENWAY WALLS ———————————————————–
(function(){
function wall(pts,y0,wh,col){
if(!pts||pts.length<2)return;
const v=[];
for(let i=0;i<pts.length-1;i++){
const ax=pts[i][0],az=-pts[i][1],bx=pts[i+1][0],bz=-pts[i+1][1];
v.push(ax,y0,az,bx,y0,bz,ax,y0+wh,az,bx,y0,bz,bx,y0+wh,bz,ax,y0+wh,az);
}
const wg=new THREE.BufferGeometry();wg.setAttribute(‘position’,new THREE.Float32BufferAttribute(v,3));wg.computeVertexNormals();
scene.add(new THREE.Mesh(wg,new THREE.MeshLambertMaterial({color:col,side:THREE.DoubleSide})));
}
function warnTrack(pts){
const v=[],w=1.4;
for(let i=0;i<pts.length-1;i++){
const ax=pts[i][0],az=-pts[i][1],bx=pts[i+1][0],bz=-pts[i+1][1];
const nx=-(bz-az),nz=bx-ax,len=Math.sqrt(nx*nx+nz*nz)||1;
const ox=nx/len*w,oz=nz/len*w;
v.push(ax,0.003,az,bx,0.003,bz,ax+ox,0.003,az+oz,bx,0.003,bz,bx+ox,0.003,bz+oz,ax+ox,0.003,az+oz);
}
const wg=new THREE.BufferGeometry();wg.setAttribute(‘position’,new THREE.Float32BufferAttribute(v,3));
scene.add(new THREE.Mesh(wg,new THREE.MeshLambertMaterial({color:0xc4894a,side:THREE.DoubleSide})));
}
const oo=FENWAY.outfield_outer;
wall(oo.filter(p=>p[0]<-28),0,11.3,0x1e5c10);
wall(oo.filter(p=>p[0]>=-28),0,3.7,0x174d0c);
warnTrack(oo);
})();

// –– FLIGHT PATH FOR REVERSE ————————————————
const FLIGHT_SAMPLES=64;
let flightPath=[];
function sampleFlightPath(p){
flightPath=[];
for(let i=0;i<=FLIGHT_SAMPLES;i++){
const t=(i/FLIGHT_SAMPLES)*p.tof;
const sc=posAtT(p,t);
flightPath.push(sc2v(sc.x,sc.y,sc.z));
}
}

// –– STRIKE ZONE ————————————————————
// Hollow white square - 4 flat strips. Turns red/blue on result.
let zoneGroup=null;
function buildZone(p){
if(zoneGroup)scene.remove(zoneGroup);
zoneGroup=new THREE.Group();
const W=0.4318,H=p.sz_top-p.sz_bot,midY=p.sz_bot+H/2;
const mat=new THREE.MeshBasicMaterial({color:0xffffff,side:THREE.DoubleSide});
const t=0.022;
[[0,p.sz_top,W,t],[0,p.sz_bot,W,t],[-W/2,midY,t,H],[W/2,midY,t,H]].forEach(([x,y,w,h])=>{
const m=new THREE.Mesh(new THREE.PlaneGeometry(w,h),mat.clone());
m.position.set(x,y,0.05);
zoneGroup.add(m);
});
scene.add(zoneGroup);
}
function colorZone(strike){
if(!zoneGroup)return;
const c=new THREE.Color(strike?0xff2200:0x0066ff);
zoneGroup.children.forEach(m=>{if(m.material)m.material.color.copy(c);});
}
function isStrike(p){return Math.abs(p.px)<=0.4318/2&&p.pz>=p.sz_bot&&p.pz<=p.sz_top;}

// –– STATE ——————————————————————
let pitchIdx=0,curPitch=null;
let phase=‘pre_pause’,phaseT=0,flightStart=0;
let relPos=new THREE.Vector3();
let endPt=new THREE.Vector3();
const PLATE_LOOK=new THREE.Vector3(0,0.09,0.06);
const ZONE_LOOK=new THREE.Vector3(0,0,0);
let rigP=new THREE.Vector3(),rigPTgt=new THREE.Vector3();
let lookA=new THREE.Vector3(),lookTgt=new THREE.Vector3();
let fovA=50,fovTgt=50,rigRoll=0;
const K=1.8;

function setZoneLook(p){ZONE_LOOK.set(0,(p.sz_bot+p.sz_top)/2,0.05);}

function loadPitch(){
curPitch=PITCHES[pitchIdx%PITCHES.length];pitchIdx++;
buildZone(curPitch);setZoneLook(curPitch);
relPos.copy(sc2v(curPitch.x0,curPitch.y0,curPitch.z0));
endPt.copy(sc2v(curPitch.px,1.417*0.3048,curPitch.pz));
ball.visible=true;
ball.position.copy(relPos);
rigPTgt.copy(batPos(curPitch.s,EYE_HIGH));
if(pitchIdx===1){rigP.copy(rigPTgt);lookA.copy(relPos);lookTgt.copy(relPos);}
phase=‘pre_pause’;phaseT=0;
}

function startFlight(){
sampleFlightPath(curPitch);
const sc0=posAtT(curPitch,0);
ball.position.copy(sc2v(sc0.x,sc0.y,sc0.z));
flightStart=performance.now();
phase=‘fly’;phaseT=0;
}

// –– RENDER LOOP ————————————————————
let lastT=performance.now();
function animate(){
requestAnimationFrame(animate);
const now=performance.now();
const dt=Math.min((now-lastT)/1000,0.05);
lastT=now;phaseT+=dt;
if(!curPitch){renderer.render(scene,camera);return;}

const side=curPitch.s;
const bP=batPos(side,EYE_HIGH);
const cP=catPos(side);

if(phase===‘pre_pause’){
rigPTgt.copy(bP);lookTgt.copy(relPos);
// Zoom progressively tighter over the 1s pause — from 50 down to 28
fovTgt=50-(50-28)*Math.min(phaseT/1.0,1.0);
ball.position.copy(relPos);ball.visible=true;
if(phaseT>=1.0){phase=‘pre_blink’;phaseT=0;}
}
else if(phase===‘pre_blink’){
rigPTgt.copy(bP);lookTgt.copy(relPos);fovTgt=28;
ball.position.copy(relPos);
ball.visible=(phaseT%0.30)/0.30<0.65;
if(phaseT>=0.9){ball.visible=true;startFlight();}
}
else if(phase===‘fly’){
const elapsed=(now-flightStart)/1000;
const prog=Math.min(elapsed/curPitch.tof,1.0);
const t=Math.min(elapsed,curPitch.tof);
const sc=posAtT(curPitch,t);
const pos=sc2v(sc.x,sc.y,sc.z);
ball.position.copy(pos);
ball.rotation.x+=dt*22;ball.rotation.z+=dt*9;
ballLight.position.copy(pos);
rigPTgt.lerpVectors(bP,cP,prog);
rigPTgt.y=EYE_HIGH+(EYE_LOW-EYE_HIGH)*Math.pow(prog,0.8);
lookTgt.lerpVectors(relPos,ZONE_LOOK,Math.min(prog/0.4,1.0));
fovTgt=28+(44-28)*prog;
rigRoll=(15*Math.PI/180)*Math.sin(prog*Math.PI)*((prog<0.5)?1:-1);
if(elapsed>=curPitch.tof+0.06){
ball.position.copy(endPt);
const strike=isStrike(curPitch);
colorZone(strike);
phase=‘post_land’;phaseT=0;
}
}
else if(phase===‘post_land’){
ball.position.copy(endPt);ball.visible=true;
rigPTgt.copy(cP);lookTgt.copy(endPt);fovTgt=44;
rigRoll*=(1-Math.min(dt*5,1));
if(phaseT>=1.0){phase=‘post_climb’;phaseT=0;}
}
else if(phase===‘post_climb’){
const t=Math.min(phaseT/1.0,1.0);
const pathIdx=Math.max(0,Math.round((1.0-t)*(flightPath.length-1)));
const ballPos=flightPath[pathIdx];
ball.position.copy(ballPos);
ballLight.position.copy(ballPos);
ball.visible=(phaseT%0.25)/0.25<0.55;
rigPTgt.lerpVectors(cP,bP,t);
lookTgt.copy(ballPos);
fovTgt=44+(50-44)*t;
if(phaseT>=1.0){ball.visible=false;loadPitch();}
}

// Unified lerp
const jt=now*0.001;
if(phase===‘fly’){
rigP.lerp(rigPTgt,Math.min(dt*12,1));
lookA.lerp(lookTgt,Math.min(dt*6,1));
fovA+=(fovTgt-fovA)*Math.min(dt*8,1);
rigP.x+=Math.sin(jt*1.3)*0.003;
rigP.y+=Math.sin(jt*0.9)*0.002;
} else {
rigRoll*=(1-Math.min(dt*3,1));
rigP.lerp(rigPTgt,Math.min(dt*K,1));
lookA.lerp(lookTgt,Math.min(dt*K,1));
fovA+=(fovTgt-fovA)*Math.min(dt*K,1);
}

if(gyroOn&&baseAlpha!==null&&phase===‘fly’){
let dA=rawAlpha-baseAlpha;if(dA>180)dA-=360;if(dA<-180)dA+=360;
rig.rotation.y=-dA*(Math.PI/180)*0.06;
rig.rotation.x=(rawBeta-baseBeta)*(Math.PI/180)*0.05;
} else {
rig.rotation.y*=(1-Math.min(dt*4,1));
rig.rotation.x*=(1-Math.min(dt*4,1));
}

rig.position.copy(rigP);
rig.rotation.z=rigRoll;
camera.fov=fovA;camera.updateProjectionMatrix();
camera.lookAt(lookA);
renderer.render(scene,camera);
}

loadPitch();
animate();
</script>
