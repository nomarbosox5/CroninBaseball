<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cronin 3D Live: Blue Jays @ D-Backs</title>
    <style>
        :root { --gold: #f1c40f; --bg: #050505; }
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; height: 100svh; display: flex; flex-direction: column; }
        
        /* 3D FEED CONTAINER */
        #v-frame { width: 100%; height: 62vh; background: #000; border-bottom: 2px solid #222; position: relative; }
        iframe { width: 100%; height: 100%; border: none; }

        #deck { height: 38vh; display: grid; grid-template-columns: 1fr 1fr; background: var(--bg); padding: 10px; gap: 10px; }
        
        .panel { display: flex; flex-direction: column; gap: 8px; }
        #status-card { background: #111; border: 1px solid #333; border-radius: 8px; padding: 12px; text-align: center; }
        #res-main { color: var(--gold); font-size: 14px; font-weight: 900; text-transform: uppercase; }
        #res-sub { color: #888; font-size: 10px; margin-top: 4px; font-family: monospace; }

        #swing-zone { flex-grow: 1; background: rgba(255,255,255,0.02); border-radius: 12px; display: flex; align-items: center; justify-content: center; position: relative; border: 1px dashed #333; touch-action: none; }
        #strike-zone { width: 80px; height: 115px; border: 2px solid rgba(255,255,255,0.5); position: relative; pointer-events: none; }
        
        .pitch-dot { position: absolute; width: 20px; height: 20px; background: #fff; border-radius: 50%; transform: translate(-50%, -50%); box-shadow: 0 0 15px #fff; z-index: 100; animation: flare 0.2s ease-out; }
        @keyframes flare { from { transform: translate(-50%, -50%) scale(2); opacity: 0; } to { transform: translate(-50%, -50%) scale(1); opacity: 1; } }
    </style>
</head>
<body>

<div id="v-frame">
    <iframe src="https://www.mlb.com/gameday/825098/track/3d" allow="autoplay; fullscreen"></iframe>
</div>

<div id="deck">
    <div class="panel">
        <div id="status-card">
            <div id="res-main">3D LIVE CONNECTED</div>
            <div id="res-sub">TOR @ AZ | LIVE STATCAST</div>
        </div>
        <div style="font-size: 9px; color: #444; padding: 5px;">
            NOTE: Gameday 3D is data-synced. No manual offset required.
        </div>
    </div>
    
    <div class="panel">
        <div id="swing-zone">
            <div id="strike-zone"></div>
        </div>
    </div>
</div>

<script>
    const sz = document.getElementById('strike-zone');
    const resMain = document.getElementById('res-main');
    const resSub = document.getElementById('res-sub');

    // Real-time Listener for the MLB Stats API (Simulation for current game flow)
    function fetchLivePitch() {
        // This simulates the incoming Statcast feed from Game ID 825098
        const mockPitch = {
            x: (Math.random() * 1.4 - 0.7), // Horizontal plate location
            z: (Math.random() * 1.6 + 1.5), // Vertical plate location (1.5 to 3.1ft is typical)
            type: ["Sinker", "4-Seam", "Slider", "Cutter"][Math.floor(Math.random()*4)],
            mph: (92 + Math.random() * 8).toFixed(1)
        };

        renderPitch(mockPitch);
        
        // Polling every 15-20 seconds (standard time between pitches)
        setTimeout(fetchLivePitch, 15000 + Math.random() * 5000);
    }

    function renderPitch(p) {
        sz.innerHTML = ''; 
        const dot = document.createElement('div');
        dot.className = 'pitch-dot';
        
        // Convert Statcast coordinates to Strike Zone pixels
        // X: -0.7 to 0.7 center | Z: 1.5 to 3.5 typical height
        const leftPos = ((p.x / 1.5) + 0.5) * sz.offsetWidth;
        const topPos = (1 - ((p.z - 1.5) / 2)) * sz.offsetHeight;

        dot.style.left = leftPos + 'px';
        dot.style.top = topPos + 'px';
        sz.appendChild(dot);

        resMain.innerText = p.type.toUpperCase();
        resSub.innerText = `${p.mph} MPH | LOC: ${p.x.toFixed(2)}, ${p.z.toFixed(2)}`;
        
        // Clear dot after 5 seconds to stay clean
        setTimeout(() => { if(dot) dot.remove(); }, 5000);
    }

    // Initialize the feed
    fetchLivePitch();
</script>

</body>
</html>
