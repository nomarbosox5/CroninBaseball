<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Statcast | Sinusoidal Release & Pro Focus</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        #broadcast-ui { position: absolute; bottom: 40px; left: 40px; color: white; }
        .pitch-tag { background: rgba(0, 30, 60, 0.85); padding: 15px; border-left: 5px solid #00d4ff; box-shadow: 5px 5px 15px rgba(0,0,0,0.5); }
        .label { font-size: 10px; letter-spacing: 2px; color: #00d4ff; margin-bottom: 2px; }
        .value { font-size: 28px; font-weight: 800; }
    </style>
</head>
<body>
    <div id="broadcast-ui">
        <div class="pitch-tag">
            <div class="label">LIVE TRACKING</div>
            <div class="value">98<span style="font-size: 16px; font-weight: 400;"> MPH</span></div>
            <div style="font-size: 12px; opacity: 0.8;">Sinker (LHP)</div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        const pitchData = { x0: -2.1, y0: 55, z0: 5.8, vx0: 5.8, vy0: -144.1, vz0: -7.5, ax: -15.2, ay: 32.1, az: -10.5 };

        let state = "REHEARSAL"; 
        let startTime = performance.now();
        let freezePoint = new THREE.Vector3();

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(35, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // --- STADIUM ASSETS ---
        const grass = new THREE.Mesh(new THREE.PlaneGeometry(600, 600), new THREE.MeshStandardMaterial({ color: 0x142900 }));
        grass.rotation.x = -Math.PI / 2;
        scene.add(grass);

        const dirtCircle = new THREE.Mesh(new THREE.CircleGeometry(75, 32), new THREE.MeshStandardMaterial({ color: 0x733a11 }));
        dirtCircle.rotation.x = -Math.PI / 2; dirtCircle.position.y = 0.01;
        scene.add(dirtCircle);

        const mound = new THREE.Mesh(new THREE.CylinderGeometry(9, 11, 0.7, 32), new THREE.MeshStandardMaterial({ color: 0x5c2e0d }));
        mound.position.set(0, 0.35, -60.5);
        scene.add(mound);

        const plate = new THREE.Mesh(new THREE.PlaneGeometry(1.417, 1.417), new THREE.MeshStandardMaterial({ color: 0xffffff }));
        plate.rotation.x = -Math.PI / 2; plate.position.y = 0.05;
        scene.add(plate);

        const zone = new THREE.LineSegments(
            new THREE.EdgesGeometry(new THREE.PlaneGeometry(1.417, 2.0)),
            new THREE.LineBasicMaterial({ color: 0x00ff00, transparent: true, opacity: 0.6 })
        );
        zone.position.set(0, 2.5, 0);
        scene.add(zone);

        const ball = new THREE.Mesh(new THREE.SphereGeometry(0.12, 24, 24), new THREE.MeshStandardMaterial({ color: 0xffffff }));
        scene.add(ball);

        // Lights
        const sun = new THREE.DirectionalLight(0xffffff, 1.2);
        sun.position.set(20, 40, 10);
        scene.add(sun);
        scene.add(new THREE.AmbientLight(0x505050));

        // --- CAMERA CONFIG ---
        camera.position.set(4.0, 6.2, 3.5); 
        const pitcherPos = new THREE.Vector3(pitchData.x0, pitchData.z0, -pitchData.y0);
        const plateTime = 0.382;

        function getBallPosAt(t) {
            return new THREE.Vector3(
                pitchData.x0 + pitchData.vx0 * t + 0.5 * pitchData.ax * t * t,
                pitchData.z0 + pitchData.vz0 * t + 0.5 * pitchData.az * t * t,
                -(pitchData.y0 + pitchData.vy0 * t + 0.5 * pitchData.ay * t * t)
            );
        }

        function animate(time) {
            requestAnimationFrame(animate);
            let elapsed = (time - startTime) / 1000;

            if (state === "REHEARSAL") {
                ball.position.copy(pitcherPos);
                let cycle = 2.8; 
                let progress = (elapsed % cycle) / cycle;
                
                // Pure Sine for the "Quick Pass" back and forth
                let t = 0.5 * (1 - Math.cos(progress * Math.PI * 2));
                let tVal = t * plateTime;
                
                camera.lookAt(getBallPosAt(tVal));
                camera.fov = 34 + (t * 14); 
                camera.updateProjectionMatrix();

                if (elapsed >= 8.4) { // 3 cycles
                    state = "SETTLE";
                    startTime = time;
                }
            }
            else if (state === "SETTLE") {
                camera.lookAt(pitcherPos);
                // --- SINUSOIDAL ZOOM IN ---
                // Slowly pulls in tight (22 FOV) right before release
                let focusProgress = Math.min(elapsed / 1.4, 1);
                let zoomSine = 0.5 * (1 - Math.cos(focusProgress * Math.PI));
                camera.fov = 34 - (zoomSine * 12); 
                camera.updateProjectionMatrix();

                if (elapsed > 1.4) { state = "LIVE"; startTime = time; }
            }
            else if (state === "LIVE") {
                let t = (time - startTime) / 1000;
                let currentPos = getBallPosAt(t);
                ball.position.copy(currentPos);

                let yDepth = pitchData.y0 + pitchData.vy0 * t + 0.5 * pitchData.ay * t * t;

                if (yDepth > 0) {
                    camera.lookAt(ball.position);
                    camera.fov = 22 + (Math.min(1 - (yDepth/55), 1) * 20);
                    camera.updateProjectionMatrix();
                } else {
                    state = "FREEZE";
                    startTime = time;
                    freezePoint.copy(ball.position);
                }
            }
            else if (state === "FREEZE") {
                let t = (time - (startTime - (plateTime * 1000))) / 1000;
                ball.position.copy(getBallPosAt(t));
                camera.lookAt(freezePoint); 

                if (elapsed > 3.5) { 
                    state = "REHEARSAL"; 
                    startTime = time; 
                }
            }
            renderer.render(scene, camera);
        }
        animate(performance.now());
    </script>
</body>
</html>
