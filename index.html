<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Cronin 2026: Auto-Sync Engine</title>
    <style>
        :root { --gold: #f1c40f; --bg: #050505; --board: #111; }
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; height: 100svh; display: flex; flex-direction: column; }
        
        #v-frame { width: 100%; height: 60vh; background: #000; }
        iframe { width: 100%; height: 100%; border: none; }

        #auto-sync-bar { 
            height: 7vh; background: #222; display: flex; align-items: center; 
            justify-content: center; border-bottom: 2px solid var(--gold); 
        }
        #sync-btn { 
            background: var(--gold); color: #000; border: none; padding: 10px 20px; 
            font-weight: 900; border-radius: 4px; letter-spacing: 1px;
        }

        #deck { height: 33vh; display: grid; grid-template-columns: 1fr 1fr; padding: 10px; gap: 10px; background: #050505; }
        #swing-zone { background: rgba(255,255,255,0.03); border-radius: 8px; position: relative; display: flex; align-items: center; justify-content: center; }
        #strike-zone { width: 80px; height: 110px; border: 2px solid #fff; position: relative; }
        .pitch-dot { position: absolute; width: 18px; height: 18px; background: #fff; border-radius: 50%; transform: translate(-50%, -50%); box-shadow: 0 0 10px #fff; }
    </style>
</head>
<body>

<div id="v-frame">
    <iframe src="https://www.mlb.com/tv/gameday" allowfullscreen></iframe>
</div>

<div id="auto-sync-bar">
    <button id="sync-btn">TAP WHEN BALL HITS GLOVE</button>
</div>

<div id="deck">
    <div id="info-panel">
        <div id="status" style="color: var(--gold); font-weight: 800;">WAITING FOR SYNC...</div>
        <div id="lag-display" style="font-size: 10px; color: #666; margin-top: 5px;">OFFSET: 0.0s</div>
    </div>
    <div id="swing-zone">
        <div id="strike-zone"></div>
    </div>
</div>

<script>
    let pitchQueue = []; 
    let globalOffset = 0; 
    let synced = false;

    const syncBtn = document.getElementById('sync-btn');
    const status = document.getElementById('status');
    const lagDisp = document.getElementById('lag-display');
    const sz = document.getElementById('strike-zone');

    // 1. TAPPING THE BUTTON LOCKS THE SYNC
    syncBtn.onclick = () => {
        if (pitchQueue.length > 0) {
            // We find the last pitch sent by the "Live" data
            const lastPitch = pitchQueue[pitchQueue.length - 1];
            // Calculate how long ago that pitch was actually "released" in real life
            globalOffset = Date.now() - lastPitch.realTime;
            
            synced = true;
            syncBtn.style.background = "#27ae60";
            syncBtn.innerText = "SYNCED TO LIVE FEED";
            status.innerText = "AUTO-SYNC ACTIVE";
            lagDisp.innerText = `OFFSET LOCKED: ${(globalOffset/1000).toFixed(1)}s`;
        }
    };

    // 2. SIMULATE LIVE MLB DATA INCOMING
    function simulateMLBData() {
        const p = {
            x: (Math.random() * 2 - 1),
            y: (Math.random() * 2 - 1),
            realTime: Date.now() // The "Birth Certificate" timestamp
        };
        pitchQueue.push(p);
        setTimeout(simulateMLBData, 15000); // New pitch every 15s
    }

    // 3. THE ENGINE: If synced, wait for the offset then show the ball
    setInterval(() => {
        if (!synced) return;

        pitchQueue.forEach((p, index) => {
            const timeToDisplay = p.realTime + globalOffset;
            if (Date.now() >= timeToDisplay) {
                renderPitch(p);
                pitchQueue.splice(index, 1);
            }
        });
    }, 100);

    function renderPitch(p) {
        sz.innerHTML = '';
        const dot = document.createElement('div');
        dot.className = 'pitch-dot';
        dot.style.left = ((p.x / 2) + 0.5) * sz.offsetWidth + 'px';
        dot.style.top = (0.5 - (p.y / 2)) * sz.offsetHeight + 'px';
        sz.appendChild(dot);
    }

    simulateMLBData();
</script>
</body>
</html>
