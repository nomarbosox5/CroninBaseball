<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Cronin Baseball: Legend Gauntlet</title>
    <style>
        :root { --gold: #f1c40f; --bg: #050505; --board: #111; }
        body { margin: 0; background: #000; color: #fff; font-family: -apple-system, system-ui, sans-serif; overflow: hidden; height: 100svh; display: flex; flex-direction: column; }
        
        #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 0.5s; }
        .start-btn { padding: 20px 50px; border: 2px solid var(--gold); color: var(--gold); background: transparent; font-weight: 900; border-radius: 50px; cursor: pointer; font-size: 18px; margin-top: 20px; }

        #v-frame { width: 100%; height: 55vh; background: #000; position: relative; }
        video { width: 100%; height: 100%; object-fit: contain; }

        #deck { height: 45vh; background: var(--bg); padding: 15px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; border-top: 1px solid #222; box-sizing: border-box; }
        .panel { display: flex; flex-direction: column; align-items: center; justify-content: space-between; height: 100%; }

        #res-card { width: 100%; background: var(--board); border: 1px solid #333; border-radius: 8px; padding: 10px; text-align: center; }
        #res-main { color: var(--gold); font-size: 16px; font-weight: 900; text-transform: uppercase; }
        
        #swing-zone { width: 100%; flex-grow: 1; background: rgba(255,255,255,0.03); border-radius: 10px; position: relative; touch-action: none; display: flex; align-items: center; justify-content: center; margin-top: 10px; border: 1px dashed #333; }
        #strike-zone { width: 110px; height: 150px; border: 2px solid rgba(255,255,255,0.3); position: relative; pointer-events: none; }

        .asset { position: absolute; width: 28px; height: 28px; border-radius: 50%; transform: translate(-50%, -50%); }
        .ball { background: #fff; box-shadow: 0 0 15px #fff; z-index: 10; border: 1px solid #ddd; }
        .bat { background: #8b5a2b; border: 2px solid #5d3a1a; z-index: 5; }

        /* The iOS Haptic Cheat Code */
        #haptic-trigger { display: none; }
    </style>
</head>
<body>

<input type="checkbox" id="haptic-trigger" role="switch">

<div id="overlay">
    <h1 style="color:var(--gold); letter-spacing:4px;">CRONIN BASEBALL</h1>
    <p style="color:#888;">THE LEGEND GAUNTLET</p>
    <button class="start-btn" onclick="startGame()">UNLEASH THE LEGENDS</button>
</div>

<div id="v-frame">
    <video id="v" preload="auto" playsinline muted crossorigin="anonymous"></video>
</div>

<div id="deck">
    <div class="panel">
        <div id="res-card">
            <div id="res-main">READY</div>
            <div id="res-sub" style="font-size: 10px; color: #555;">SWING AT 2.8s</div>
        </div>
        <div id="swing-zone"><div id="strike-zone"></div></div>
    </div>
    
    <div class="panel" style="background:#111; border-radius:8px; border:1px solid #222; justify-content:center;">
        <div style="font-size:10px; color:#444;">BATTER</div>
        <div id="p-name" style="font-size:24px; font-weight:900; color:#fff;">--</div>
        <div id="p-count" style="font-size:12px; color:var(--gold); margin-top:10px;">--</div>
    </div>
</div>

<script>
    const v = document.getElementById('v');
    const resMain = document.getElementById('res-main');
    const pName = document.getElementById('p-name');
    const pCount = document.getElementById('p-count');
    const sz = document.getElementById('strike-zone');
    const swz = document.getElementById('swing-zone');
    const haptic = document.getElementById('haptic-trigger');

    // PRELOADED 2026 DATA
    const playlist = [
        { name: "JUDGE", src: "https://fastball-clips.mlb.com/718501/7be37882-78d1-456a-9a84-07d88476231d.mp4", x: -0.15, y: 0.65 },
        { name: "JUDGE", src: "https://fastball-clips.mlb.com/718502/1a2b3c4d-5e6f-7g8h-9i0j-k1l2m3n4o5p6.mp4", x: 0.10, y: 0.85 },
        { name: "TROUT", src: "https://fastball-clips.mlb.com/718501/a8f2392c-1234-4567-890b-cdef12345678.mp4", x: 0.05, y: 0.82 },
        { name: "OHTANI", src: "https://fastball-clips.mlb.com/718450/shohei-ohtani-homers-2-on-a-fly-ball-to-center-field.mp4", x: -0.32, y: 0.25 },
        { name: "OHTANI", src: "https://fastball-clips.mlb.com/718430/shohei-ohtani-homers-4-on-a-fly-ball-to-right-field-0yarvo.mp4", x: 0.12, y: 0.88 }
    ];

    let current = 0;
    let swung = false;

    function startGame() {
        document.getElementById('overlay').style.opacity = '0';
        setTimeout(() => document.getElementById('overlay').style.display = 'none', 500);
        playNext();
    }

    function playNext() {
        if (current >= playlist.length) {
            resMain.innerText = "SERIES COMPLETE!";
            return;
        }
        const hr = playlist[current];
        pName.innerText = hr.name;
        pCount.innerText = `CLIP ${current + 1} / ${playlist.length}`;
        swung = false;
        sz.innerHTML = "";
        v.src = hr.src;
        v.play();
        resMain.innerText = "WATCH PITCH...";
    }

    swz.addEventListener('touchstart', (e) => {
        if (swung || !playlist[current]) return;
        const now = v.currentTime;
        if (Math.abs(now - 2.8) > 0.8) return;

        swung = true;
        const rect = sz.getBoundingClientRect();
        const tx = e.touches[0].clientX - rect.left;
        const ty = e.touches[0].clientY - rect.top;

        const hr = playlist[current];
        const bx = ((hr.x / 1.5) + 0.5) * sz.offsetWidth;
        const by = (0.5 - (hr.y / 2.0)) * sz.offsetHeight;

        createAsset('ball', bx, by);
        createAsset('bat', tx, ty);

        const dist = Math.sqrt((tx-bx)**2 + (ty-by)**2);
        
        if (dist < 40) {
            resMain.innerText = "CRUSHED! HOME RUN!";
            // Trigger Haptics
            haptic.click(); 
            if (navigator.vibrate) navigator.vibrate(50); 
        } else {
            resMain.innerText = "FOUL / MISS";
        }

        setTimeout(() => { current++; playNext(); }, 2500);
    });

    function createAsset(t, x, y) {
        const d = document.createElement('div');
        d.className = `asset ${t}`;
        d.style.left = x + 'px';
        d.style.top = y + 'px';
        sz.appendChild(d);
    }

    v.onended = () => { if(!swung) { current++; playNext(); } };
</script>
</body>
</html>
