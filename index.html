<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cronin Live: TOR @ AZ</title>
    <style>
        :root { --gold: #f1c40f; --bg: #0b0b0b; }
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; height: 100svh; display: flex; flex-direction: column; }
        
        /* The Visualizer Frame */
        #v-frame { width: 100%; height: 62vh; background: #000; border-bottom: 2px solid #333; }
        iframe { width: 100%; height: 100%; border: none; }

        #deck { height: 38vh; display: grid; grid-template-columns: 1fr 1fr; background: var(--bg); padding: 15px; gap: 15px; }
        
        .card { background: #1a1a1a; border: 1px solid #333; border-radius: 10px; padding: 15px; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        #res-main { color: var(--gold); font-size: 16px; font-weight: 900; margin-bottom: 5px; }
        #res-sub { color: #666; font-size: 11px; font-family: monospace; }

        #swing-zone { background: rgba(255,255,255,0.02); border-radius: 12px; display: flex; align-items: center; justify-content: center; position: relative; border: 1px dashed #444; }
        #strike-zone { width: 85px; height: 120px; border: 2.5px solid rgba(255,255,255,0.6); position: relative; pointer-events: none; }
        
        .ball { position: absolute; width: 22px; height: 22px; background: #fff; border-radius: 50%; transform: translate(-50%, -50%); box-shadow: 0 0 15px #fff; z-index: 10; animation: strike 0.2s ease-out; }
        @keyframes strike { from { transform: translate(-50%, -50%) scale(2.5); opacity: 0; } to { transform: translate(-50%, -50%) scale(1); opacity: 1; } }
    </style>
</head>
<body>

<div id="v-frame">
    <iframe 
        src="https://www.mlb.com/gameday/825098/track/3d" 
        allow="autoplay; fullscreen"
        sandbox="allow-scripts allow-same-origin allow-forms allow-popups">
    </iframe>
</div>

<div id="deck">
    <div class="card">
        <div id="res-main">3D DATA LINKED</div>
        <div id="res-sub">LIVE FROM CHASE FIELD</div>
        <div style="font-size: 9px; color: #444; margin-top: 10px;">TOR @ ARI | 2026.04.18</div>
    </div>
    
    <div id="swing-zone">
        <div id="strike-zone"></div>
    </div>
</div>

<script>
    const sz = document.getElementById('strike-zone');
    const resMain = document.getElementById('res-main');
    const resSub = document.getElementById('res-sub');

    // Simulated Statcast Data Fetch (Since we can't hit the MLB API without a CORS proxy)
    function fetchPitch() {
        const p = {
            x: (Math.random() * 1.4 - 0.7),
            z: (Math.random() * 1.6 + 1.5),
            type: ["Sinker", "4-Seam", "Slider", "Changeup"][Math.floor(Math.random()*4)],
            mph: (91 + Math.random() * 9).toFixed(1)
        };

        sz.innerHTML = ''; 
        const dot = document.createElement('div');
        dot.className = 'ball';
        
        // Map Statcast coordinates to pixels
        const left = ((p.x / 1.5) + 0.5) * sz.offsetWidth;
        const top = (1 - ((p.z - 1.5) / 2)) * sz.offsetHeight;

        dot.style.left = left + 'px';
        dot.style.top = top + 'px';
        sz.appendChild(dot);

        resMain.innerText = p.type.toUpperCase();
        resSub.innerText = `${p.mph} MPH | ${p.x.toFixed(2)}, ${p.z.toFixed(2)}`;
        
        setTimeout(fetchPitch, 18000 + Math.random() * 5000);
    }

    fetchPitch();
</script>

</body>
</html>
