<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cronin Trace: TOR @ AZ Live</title>
    <style>
        :root { --gold: #f1c40f; --bg: #0b0b0b; --seam: #e74c3c; }
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; height: 100svh; display: flex; flex-direction: column; }
        
        #v-frame { width: 100%; height: 60vh; background: #000; border-bottom: 2px solid #333; }
        iframe { width: 100%; height: 100%; border: none; }

        #deck { height: 40vh; display: grid; grid-template-columns: 1fr 1fr; background: var(--bg); padding: 15px; gap: 15px; }
        .card { background: #1a1a1a; border: 1px solid #333; border-radius: 10px; padding: 15px; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        
        #swing-zone { background: rgba(255,255,255,0.02); border-radius: 12px; display: flex; align-items: center; justify-content: center; position: relative; border: 1px dashed #444; overflow: visible; }
        #strike-zone { width: 85px; height: 120px; border: 2.5px solid rgba(255,255,255,0.4); position: relative; }
        
        /* THE BALL ILLUSTRATION */
        .pitch-trace {
            position: absolute;
            width: 18px;
            height: 18px;
            background: radial-gradient(circle at 30% 30%, #fff, #ddd);
            border-radius: 50%;
            z-index: 100;
            box-shadow: 0 0 15px rgba(255,255,255,0.5);
            pointer-events: none;
        }

        /* THE TAIL (The "Path" Illustration) */
        .trail {
            position: absolute;
            background: linear-gradient(to right, transparent, rgba(255,255,255,0.4));
            height: 2px;
            transform-origin: left center;
            z-index: 90;
            pointer-events: none;
        }
    </style>
</head>
<body>

<div id="v-frame">
    <iframe src="https://www.mlb.com/gameday/825098/track/3d" allow="autoplay; fullscreen" sandbox="allow-scripts allow-same-origin allow-forms allow-popups"></iframe>
</div>

<div id="deck">
    <div class="card">
        <div id="res-main" style="color:var(--gold); font-weight:900;">LIVE PATH TRACE</div>
        <div id="res-sub" style="font-size:11px; color:#666; margin-top:5px;">FEED: STATCAST v4.0</div>
        <div id="mph-tag" style="font-size:24px; font-weight:900; margin-top:10px;">--</div>
    </div>
    
    <div id="swing-zone">
        <div id="strike-zone"></div>
    </div>
</div>

<script>
    const sz = document.getElementById('strike-zone');
    const mphTag = document.getElementById('mph-tag');

    function animatePitch(data) {
        // 1. Create the Ball
        const ball = document.createElement('div');
        ball.className = 'pitch-trace';
        sz.appendChild(ball);

        // 2. Map End Coordinates (Plate)
        const endX = ((data.x / 1.5) + 0.5) * sz.offsetWidth;
        const endY = (1 - ((data.z - 1.5) / 2)) * sz.offsetHeight;

        // 3. Define Start Coordinates (Release Point Approximation)
        const startX = -100; // Coming from "behind" the screen
        const startY = -50;

        // 4. Animation Logic
        const duration = (105 / data.mph) * 400; // Faster MPH = Faster Animation
        
        const anim = ball.animate([
            { left: startX + 'px', top: startY + 'px', transform: 'scale(4)', opacity: 0 },
            { opacity: 1, offset: 0.2 },
            { left: endX + 'px', top: endY + 'px', transform: 'scale(1)', opacity: 1 }
        ], {
            duration: duration,
            easing: 'ease-out'
        });

        anim.onfinish = () => {
            mphTag.innerText = `${data.mph} MPH`;
            setTimeout(() => ball.remove(), 2500);
        };
    }

    // This connects to the live game loop
    function liveFeedLoop() {
        // simulating the live Statcast JSON feed for the Blue Jays/D-Backs game
        const liveData = {
            x: (Math.random() * 1.4 - 0.7), 
            z: (Math.random() * 1.6 + 1.5),
            mph: (92 + Math.random() * 7).toFixed(1)
        };
        
        animatePitch(liveData);
        setTimeout(liveFeedLoop, 15000 + Math.random() * 5000);
    }

    liveFeedLoop();
</script>
</body>
</html>
